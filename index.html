<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Helado Hoy? 🍦💙</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --blue-100: #e0f2fe;
            --blue-200: #bae6fd;
            --blue-500: #38bdf8;
            --blue-600: #0284c7;
            --blue-700: #0369a1;
            --blue-950: #082f49;
            
            --background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);
            --font-main: 'Poppins', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--background);
            font-family: var(--font-main);
            color: var(--blue-950);
            text-align: center;
            overflow-x: hidden;
        }

        /* Contenedor vidrioso (Glassmorphism) */
        .app-container {
            background: rgba(255, 255, 255, 0.4);
            padding: 2rem;
            border-radius: 2rem;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            max-width: 90%;
            width: 400px;
        }

        h1 {
            font-weight: 700;
            font-size: 1.8rem;
            color: var(--blue-700);
            margin-top: 0;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 1rem;
            color: var(--blue-950);
            margin-bottom: 2rem;
            font-weight: 400;
        }

        /* Estilos de la Ruleta */
        .wheel-box {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 0 auto 2rem auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* El puntero indicador */
        .pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 35px solid var(--blue-950);
            z-index: 10;
            filter: drop-shadow(0px 4px 4px rgba(0,0,0,0.2));
        }

        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 6px solid #fff;
            box-shadow: 0 8px 30px rgba(2, 132, 199, 0.3);
            /* Transición suave y realista */
            transition: transform 5s cubic-bezier(0.2, 0.9, 0.3, 1);
        }

        /* Botón elegante */
        .spin-btn {
            background: var(--blue-600);
            color: white;
            border: none;
            padding: 1rem 2.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: var(--font-main);
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(2, 132, 199, 0.4);
            transition: all 0.3s ease;
        }

        .spin-btn:hover {
            background: var(--blue-700);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(2, 132, 199, 0.6);
        }

        .spin-btn:disabled {
            background: #94a3b8;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Resultado */
        .result-display {
            margin-top: 1.5rem;
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--blue-700);
            min-height: 2rem;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.5s ease;
        }

        .result-display.show {
            opacity: 1;
            transform: scale(1);
        }

        /* Responsive para móviles muy pequeños */
        @media (max-width: 360px) {
            .wheel-box {
                width: 280px;
                height: 280px;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>¿Helado Hoy? 🍦💙</h1>
        <p class="subtitle">Toca para decidir nuestro destino helado.</p>
        
        <div class="wheel-box">
            <div class="pointer"></div>
            <canvas id="wheel" width="500" height="500"></canvas>
        </div>

        <button class="spin-btn" id="spinBtn">¡Girar Ruleta!</button>
        
        <div class="result-display" id="result"></div>
    </div>

    <script>
        const canvas = document.getElementById("wheel");
        const ctx = canvas.getContext("2d");
        const spinBtn = document.getElementById("spinBtn");
        const resultDiv = document.getElementById("result");

        const options = ["Delicato gelato", "Negle", "Mr Gelato", "Mucca", "Popsy", "Los Corales"];
        
        // Colores mejorados (Matices de azul)
        const colors = [
            "#38bdf8", // Azul 1 (más vibrante)
            "#0284c7", // Azul 2 (medio)
            "#bae6fd", // Azul 3 (muy claro)
            "#0ea5e9", // Azul 4 (medio-claro)
            "#0369a1", // Azul 5 (oscuro)
            "#e0f2fe"  // Azul 6 (el más claro, casi blanco)
        ];

        const numOptions = options.length;
        const arcSize = (2 * Math.PI) / numOptions;
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const radius = centerX; // Usar todo el espacio disponible

        // Función que dibuja la ruleta y arregla el texto
        function drawWheel() {
            for (let i = 0; i < numOptions; i++) {
                const angle = i * arcSize;
                
                // 1. Dibujar segmento
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, angle, angle + arcSize, false);
                ctx.lineTo(centerX, centerY);
                ctx.fillStyle = colors[i];
                ctx.fill();

                // 2. Configurar texto
                ctx.save();
                ctx.fillStyle = (colors[i] === "#e0f2fe" || colors[i] === "#bae6fd") ? "#082f49" : "white"; // Contraste inteligente
                ctx.font = "bold 26px 'Poppins', sans-serif";
                
                // 3. Posicionar el texto (Esta es la mejora clave)
                const textAngle = angle + arcSize / 2; // Ángulo central del segmento
                ctx.translate(centerX, centerY);      // Mover el origen al centro
                ctx.rotate(textAngle);                // Rotar el contexto al ángulo del segmento

                // Alinear y dibujar el texto hacia afuera desde el centro
                ctx.textAlign = "right";  // Alinear el texto a la derecha
                ctx.textBaseline = "middle";
                
                // Separación sutil del centro
                ctx.fillText(options[i], radius - 30, 0); 
                
                ctx.restore();
            }
        }

        drawWheel();

        // --- Lógica del Giro ---
        let currentRotation = 0;
        let isFirstSpin = true; // Control del truco

        spinBtn.addEventListener("click", () => {
            spinBtn.disabled = true;
            resultDiv.classList.remove("show");
            
            let targetIdx;

            if (isFirstSpin) {
                // PRIMER GIRO: Trucado para Delicato Gelato (Índice 0)
                targetIdx = 0;
                isFirstSpin = false; // El siguiente giro ya será al azar
            } else {
                // GIROS SIGUIENTES: Totalmente al azar
                targetIdx = Math.floor(Math.random() * numOptions);
            }

            // Matemáticas de la animación
            const sliceDeg = 360 / numOptions;
            
            // Queremos que el segmento elegido caiga BAJO EL PUNTERO (que está arriba, a 270 grados).
            // La fórmula alinea el centro del segmento elegido con el puntero superior.
            const targetCenterAngle = (sliceDeg * targetIdx) + (sliceDeg / 2);
            const targetRotationNeeded = 270 - targetCenterAngle;

            // Damos 5 vueltas completas dramáticas (1800 grados) + el offset para el target
            const totalSpinsDeg = (360 * 5);
            
            // Calculamos cuánto le falta a la rotación actual para alinearse con el target.
            // Esto asegura que la ruleta siempre gire "hacia adelante".
            const finalRotationDegrees = currentRotation + totalSpinsDeg + ((targetRotationNeeded - (currentRotation % 360) + 360) % 360);

            // Guardamos la nueva posición como la actual para el próximo giro
            currentRotation = finalRotationDegrees;

            // Aplicar rotación con CSS
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            // Esperar el final de la animación (5 segundos en el CSS)
            setTimeout(() => {
                resultDiv.innerText = `¡Nos vamos a ${options[targetIdx]}! 🍨💚`;
                resultDiv.classList.add("show");
                spinBtn.disabled = false;
            }, 5100); // Pequeño delay extra para asegurar que pare
        });
    </script>
</body>
</html>
